name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run Haruspex self-test
        run: python3 scripts/self_test.py
      - name: Build release artifacts
        run: python3 scripts/build_release.py --output dist --skip-tests
      - uses: actions/upload-artifact@v4
        with:
          name: haruspex-release
          path: dist/
