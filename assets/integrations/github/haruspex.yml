name: Haruspex

on:
  pull_request:
  push:
    branches: [main]

jobs:
  diligence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate Haruspex state and gates
        run: python3 .haruspex/bin/haruspex.py ci .
